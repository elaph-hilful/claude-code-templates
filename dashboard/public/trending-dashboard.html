  :root {

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--plane);
    color: var(--text-primary);

  }
  .wrap { max-width: 1120px; margin: 0 auto; padding: 28px 20px 64px; }

  header.top { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 22px; }

  header.top .sub { color: var(--text-secondary); font-size: 13px; }

  .btn {
    font: inherit; font-size: 13px; cursor: pointer;
    background: var(--surface-1); color: var(--text-secondary);
    border: 1px solid var(--border); border-radius: 8px; padding: 7px 12px;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { color: var(--text-primary); }

  /* stat tiles */
  .tiles { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 22px; }
  .tile { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 16px 18px; }
  .tile .label { color: var(--text-secondary); font-size: 12px; letter-spacing: .02em; text-transform: uppercase; }
  .tile .value { font-size: 30px; font-weight: 650; margin-top: 6px; letter-spacing: -0.02em; }
  .tile .value small { font-size: 14px; font-weight: 500; color: var(--text-secondary); }
  .tile .foot { color: var(--muted); font-size: 12px; margin-top: 4px; }

  .card { background: var(--surface-1); border: 1px solid var(--border); border-radius: 14px; padding: 18px 18px 12px; margin-bottom: 18px; }
  .card h2 { font-size: 15px; margin: 0; letter-spacing: -0.01em; }
  .card .desc { color: var(--text-secondary); font-size: 12.5px; margin: 3px 0 12px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

  .legend { display: flex; flex-wrap: wrap; gap: 12px 16px; margin-top: 6px; }
  .legend .item { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-secondary); }
  .legend .swatch { width: 11px; height: 11px; border-radius: 3px; flex: none; }

  svg { display: block; width: 100%; height: auto; overflow: visible; }
  .grid line { stroke: var(--grid); stroke-width: 1; }
  .axis text { fill: var(--muted); font-size: 11px; }
  .axis text.tab { font-variant-numeric: tabular-nums; }
  .serieslabel { font-size: 11px; font-weight: 600; }
  .barlabel { fill: var(--text-secondary); font-size: 11.5px; }
  .barvalue { fill: var(--text-primary); font-size: 11.5px; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* tooltip */
  .tt {
    position: fixed; pointer-events: none; z-index: 20; opacity: 0; transition: opacity .08s;
    background: var(--surface-1); color: var(--text-primary);
    border: 1px solid var(--border); border-radius: 10px; padding: 9px 11px;
    font-size: 12px; box-shadow: 0 6px 24px rgba(0,0,0,.16); min-width: 150px;
  }
  .tt .tt-title { color: var(--text-secondary); font-size: 11px; margin-bottom: 6px; }
  .tt .tt-row { display: flex; align-items: center; gap: 7px; justify-content: space-between; margin: 2px 0; }
  .tt .tt-row .k { display: inline-flex; align-items: center; gap: 6px; }
  .tt .tt-row .sw { width: 9px; height: 9px; border-radius: 2px; flex: none; }
  .tt .tt-row .v { font-variant-numeric: tabular-nums; font-weight: 600; }

  /* table view */
  .tableview { display: none; overflow-x: auto; }
  .tableview.on { display: block; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { text-align: left; padding: 7px 10px; border-bottom: 1px solid var(--border); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  thead th { color: var(--text-secondary); font-weight: 600; }

  .flag { font-size: 15px; }
  @media (max-width: 720px) {
    .tiles { grid-template-columns: repeat(2, 1fr); }
    .row2 { grid-template-columns: 1fr; }
  }
</style>

  tt.style.left = Math.max(8, left) + "px";
  tt.style.top = Math.max(8, top) + "px";
}
const hideTip = () => (tt.style.opacity = "0");

function svg(w, h) {
  const s = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  s.setAttribute("viewBox", `0 0 ${w} ${h}`);
  s.setAttribute("role", "img");
  return s;
}
function el(tag, attrs, parent) {
  const n = document.createElementNS("http://www.w3.org/2000/svg", tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(n);
  return n;
}
function niceTop(max) {
  if (!(max > 0)) return { top: 10, step: 5 }; // empty / all-zero data
  const pow = Math.pow(10, Math.floor(Math.log10(max)));
  const step = [1, 2, 2.5, 5, 10].find(s => s * pow >= max / 4) * pow;
  return { top: Math.ceil(max / step) * step, step };
}

/* ---------------- KPI tiles ---------------- */
function renderTiles(d) {
  const g = d.globalStats;
  const tiles = [
    { label: "Total downloads", value: NUM(g.totalDownloads) },
    { label: "This month",      value: NUM(g.monthlyDownloads), foot: "downloads in the last 30 days" },
    { label: "Components",      value: NUM(g.totalComponents),  foot: "agents, commands, MCPs, skills…" },
    { label: "Countries",       value: NUM(g.totalCountries),   foot: "with at least one install" },
  ];
  $("#tiles").innerHTML = tiles.map(t =>
    `<div class="tile"><div class="label">${t.label}</div>
       <div class="value">${t.value}</div>
       <div class="foot">${t.foot || " "}</div></div>`
  ).join("");
}

/* ---------------- Line chart ---------------- */
let lineState = null;
function renderLine(d) {
  const host = $("#lineChart"); host.innerHTML = "";
  const dates = d.chartData.dates, series = d.chartData.series;
  const W = 1040, H = 420, m = { t: 14, r: 96, b: 34, l: 52 };
  const iw = W - m.l - m.r, ih = H - m.t - m.b;
  const n = dates.length;
  let max = 0;
  TYPES.forEach(t => (series[t.key] || []).forEach(v => (max = Math.max(max, v))));
  const { top, step } = niceTop(max);
  const X = i => m.l + (iw * i) / (n - 1);
  const Y = v => m.t + ih - (ih * v) / top;
  const s = svg(W, H); host.appendChild(s);

  // gridlines + y ticks
  const gg = el("g", { class: "grid" }, s);
  const ax = el("g", { class: "axis" }, s);
  for (let v = 0; v <= top + 1; v += step) {
    el("line", { x1: m.l, y1: Y(v), x2: m.l + iw, y2: Y(v) }, gg);
    const tx = el("text", { x: m.l - 8, y: Y(v) + 4, "text-anchor": "end", class: "tab" }, ax);
    tx.textContent = v >= 1000 ? (v / 1000) + "k" : v;
  }
  // x ticks (every ~5 days + last)
  dates.forEach((dt, i) => {
    if (i % 5 === 0 || i === n - 1) {
      const tx = el("text", { x: X(i), y: H - 12, "text-anchor": "middle" }, ax);
      tx.textContent = dt.slice(5);
    }
  });
  // baseline
  el("line", { x1: m.l, y1: Y(0), x2: m.l + iw, y2: Y(0), stroke: "var(--baseline)", "stroke-width": 1 }, s);

  // lines (direct labels = secondary encoding, satisfies relief rule)
  const ends = [];
  TYPES.forEach(t => {
    const data = series[t.key]; if (!data) return;
    const dstr = data.map((v, i) => `${i ? "L" : "M"}${X(i)},${Y(v)}`).join(" ");
    el("path", { d: dstr, fill: "none", stroke: t.color, "stroke-width": 2, "stroke-linejoin": "round", "stroke-linecap": "round" }, s);
    ends.push({ t, y: Y(data[n - 1]) });
  });
  // declutter end labels: keep >=13px apart, top→bottom
  ends.sort((a, b) => a.y - b.y);
  const GAP = 13;
  for (let i = 1; i < ends.length; i++)
    if (ends[i].y - ends[i - 1].y < GAP) ends[i].y = ends[i - 1].y + GAP;
  // clamp to plot and re-spread upward if pushed past the bottom
  const bottom = m.t + ih;
  for (let i = ends.length - 1; i >= 0; i--) {
    if (ends[i].y > bottom) ends[i].y = bottom - (ends.length - 1 - i) * GAP;
    if (i < ends.length - 1 && ends[i + 1].y - ends[i].y < GAP) ends[i].y = ends[i + 1].y - GAP;
  }
  ends.forEach(e => {
    const lab = el("text", { x: m.l + iw + 8, y: e.y + 4, class: "serieslabel", fill: e.t.color }, s);
    lab.textContent = e.t.label;
  });

  // crosshair + hover layer
  const cross = el("line", { x1: 0, y1: m.t, x2: 0, y2: m.t + ih, stroke: "var(--baseline)", "stroke-width": 1, opacity: 0 }, s);
  const dots = TYPES.map(t => el("circle", { r: 4, fill: t.color, stroke: "var(--surface-1)", "stroke-width": 2, opacity: 0 }, s));
  const hit = el("rect", { x: m.l, y: m.t, width: iw, height: ih, fill: "transparent" }, s);
  function move(evt) {
    const r = s.getBoundingClientRect();
    const px = (evt.clientX - r.left) / r.width * W;
    let i = Math.round((px - m.l) / iw * (n - 1));
    i = Math.max(0, Math.min(n - 1, i));
    cross.setAttribute("x1", X(i)); cross.setAttribute("x2", X(i)); cross.setAttribute("opacity", 1);
    const rows = TYPES.map((t, k) => {
      const v = series[t.key] ? series[t.key][i] : 0;
      dots[k].setAttribute("cx", X(i)); dots[k].setAttribute("cy", Y(v)); dots[k].setAttribute("opacity", 1);
      return { t, v };
    }).sort((a, b) => b.v - a.v);
    const html = `<div class="tt-title">${dates[i]}</div>` + rows.map(r =>
      `<div class="tt-row"><span class="k"><span class="sw" style="background:${r.t.color}"></span>${r.t.label}</span><span class="v">${NUM(r.v)}</span></div>`
    ).join("");
    showTip(html, evt.clientX, evt.clientY);
  }
  hit.addEventListener("mousemove", move);
  hit.addEventListener("mouseleave", () => { hideTip(); cross.setAttribute("opacity", 0); dots.forEach(dd => dd.setAttribute("opacity", 0)); });

  // legend
  $("#lineLegend").innerHTML = TYPES.map(t =>
    `<span class="item"><span class="swatch" style="background:${t.color}"></span>${t.label}</span>`
  ).join("");

  // description — flag an empty window (no downloads recorded in range)
  const win = `${dates[0]} → ${dates[dates.length - 1]}`;
  if (max === 0) {
    $("#lineDesc").innerHTML = `Running total per component type, ${win}. <b>No downloads recorded in this window</b> — the latest data in the source ends earlier.`;
    el("text", { x: m.l + iw / 2, y: m.t + ih / 2, "text-anchor": "middle", fill: "var(--muted)", "font-size": 13 }, s).textContent = "No activity in this date range";
  } else {
    $("#lineDesc").textContent = `Running total per component type, ${win}.`;
  }

  // table
  const head = `<tr><th>Date</th>${TYPES.map(t => `<th class="num">${t.label}</th>`).join("")}</tr>`;
  const body = dates.map((dt, i) =>
    `<tr><td>${dt}</td>${TYPES.map(t => `<td class="num">${NUM(series[t.key] ? series[t.key][i] : 0)}</td>`).join("")}</tr>`
  ).join("");
  $("#lineTable").innerHTML = `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
}

/* ---------------- Horizontal magnitude bars ---------------- */
function renderBars(hostSel, tableSel, items, opts) {
  const host = $(hostSel); host.innerHTML = "";
  const rowH = 34, gap = 8, m = { t: 6, r: 64, b: 6, l: opts.labelW };
  const W = 500, H = m.t + m.b + items.length * rowH;
  const iw = W - m.l - m.r;
  const max = Math.max(...items.map(it => it.value));
  const { top } = niceTop(max);
  const s = svg(W, H); host.appendChild(s);
  const barH = rowH - gap;

  items.forEach((it, i) => {
    const y = m.t + i * rowH;
    const w = Math.max(2, iw * it.value / top);
    // label
    const lab = el("text", { x: m.l - 10, y: y + barH / 2 + 4, "text-anchor": "end", class: "barlabel" }, s);
    lab.textContent = it.label;
    if (it.flag) { const f = el("text", { x: 2, y: y + barH / 2 + 5 }, s); f.textContent = it.flag; f.setAttribute("font-size", "15"); }
    // track
    el("rect", { x: m.l, y, width: iw, height: barH, rx: 4, fill: "var(--grid)", opacity: .5 }, s);
    // bar — 4px rounded data-end
    const bar = el("rect", { x: m.l, y, width: w, height: barH, rx: 4, fill: opts.color }, s);
    // value
    const val = el("text", { x: m.l + w + 8, y: y + barH / 2 + 4, class: "barvalue" }, s);
    val.textContent = NUM(it.value);
    // hover
    const hit = el("rect", { x: 0, y, width: W, height: rowH, fill: "transparent" }, s);
    const over = e => showTip(
      `<div class="tt-title">${it.label}</div>
       <div class="tt-row"><span class="k"><span class="sw" style="background:${opts.color}"></span>${opts.valueLabel}</span><span class="v">${NUM(it.value)}</span></div>` +
      (it.sub ? `<div class="tt-row"><span class="k">${it.sub.k}</span><span class="v">${it.sub.v}</span></div>` : ""),
      e.clientX, e.clientY);
    hit.addEventListener("mousemove", over);
    hit.addEventListener("mouseleave", hideTip);
    bar.addEventListener("mousemove", over);
  });

  // table
  $(tableSel).innerHTML = `<table><thead><tr><th>${opts.rowLabel}</th><th class="num">${opts.valueLabel}</th>${opts.subCol ? `<th class="num">${opts.subCol}</th>` : ""}</tr></thead><tbody>` +
    items.map(it => `<tr><td>${it.flag ? it.flag + " " : ""}${it.label}</td><td class="num">${NUM(it.value)}</td>${opts.subCol ? `<td class="num">${it.sub ? it.sub.v : ""}</td>` : ""}</tr>`).join("") +
    "</tbody></table>";
}

/* ---------------- Boot ---------------- */
function render(d) {
  const dt = new Date(d.lastUpdated.replace("+00:00Z", "Z"));
  $("#updated").textContent = "Updated " + dt.toLocaleDateString("en-US", { year: "numeric", month: "long", day: "numeric" }) +
    " · " + NUM(d.globalStats.totalComponents) + " components tracked";
  $("#countryTotal").textContent = NUM(d.globalStats.totalCountries);

  renderTiles(d);
  renderLine(d);

  const comps = [...d.trending.all].sort((a, b) => b.downloadsTotal - a.downloadsTotal)
    .map(c => ({ label: c.name, value: c.downloadsTotal, sub: { k: "Category", v: c.category } }));
  renderBars("#compChart", "#compTable", comps, {
    color: "var(--seq)", labelW: 190, valueLabel: "Downloads", rowLabel: "Component", subCol: "Category",
  });

  const ctry = d.topCountries.map(c => ({ label: c.name, flag: c.flag, value: c.downloads, sub: { k: "Share", v: c.percentage + "%" } }));
  renderBars("#ctryChart", "#ctryTable", ctry, {
    color: "var(--seq)", labelW: 150, valueLabel: "Downloads", rowLabel: "Country", subCol: "Share",
  });

  // re-render on resize so tooltips/labels stay aligned
  clearTimeout(window.__rz);
  window.addEventListener("resize", () => { clearTimeout(window.__rz); window.__rz = setTimeout(() => renderLine(d), 150); }, { once: true });
}

// theme
const themeBtn = $("#themeBtn");
function applyTheme(mode) { document.documentElement.setAttribute("data-theme", mode); localStorage.setItem("cct-theme", mode); }
applyTheme(localStorage.getItem("cct-theme") || (matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light"));
themeBtn.addEventListener("click", () => {
  const cur = document.documentElement.getAttribute("data-theme");
  applyTheme(cur === "dark" ? "light" : "dark");
});
// table toggle
const tableBtn = $("#tableBtn");
tableBtn.addEventListener("click", () => {
  const on = tableBtn.getAttribute("aria-pressed") === "true";
  tableBtn.setAttribute("aria-pressed", String(!on));
  document.querySelectorAll(".tableview").forEach(t => t.classList.toggle("on", !on));
});

// data: prefer live file, fall back to embedded snapshot
const embedded = JSON.parse($("#embedded").textContent);
fetch("./trending-data.json", { cache: "no-store" })
  .then(r => (r.ok ? r.json() : Promise.reject()))
  .then(render)
  .catch(() => render(embedded));
</script>
